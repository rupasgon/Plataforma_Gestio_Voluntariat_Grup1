<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>El meu perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="container-fluid mt-4 px-5">
      <nav class="row menu-celeste shadow p-3 mb-3">
        <div class="col-12">
          <ul class="nav nav-pills d-flex w-100">
            <li class="nav-item">
              <a class="nav-link text-dark" href="../index.html">Inici</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark" href="./voluntari-form.html">Voluntaris</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark" href="./aprenent-form.html">Aprenents</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark" href="#">Contacte</a>
            </li>
            <li class="nav-item ms-md-auto">
              <a class="nav-link text-dark" href="./login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark" href="./admin.html">Administrador</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="container py-5">
      <div class="d-flex justify-content-end align-items-center flex-wrap gap-2 mb-4">
        <span class="text-muted" id="usuari_autenticat"></span>
        <button class="btn btn-outline-secondary" id="tancar_sessio" type="button">Tancar sessio</button>
      </div>

      <h1 class="mb-4">El meu perfil</h1>
      <form class="card p-4" id="formulari_perfil">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" id="nom" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="cognoms">Cognoms</label>
            <input class="form-control" id="cognoms" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="correu">Correu electronic</label>
            <input class="form-control" id="correu" type="email" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="telefon">Telefon</label>
            <input class="form-control" id="telefon" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="parroquia">Parroquia</label>
            <input class="form-control" id="parroquia" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="data_naixement">Data de naixement</label>
            <input class="form-control" id="data_naixement" type="date" />
          </div>
          <div class="col-12">
            <label class="form-label" for="disponibilitat">Disponibilitat</label>
            <input class="form-control" id="disponibilitat" />
          </div>
          <div class="col-12">
            <label class="form-label" for="observacions">Observacions</label>
            <textarea class="form-control" id="observacions" rows="3"></textarea>
          </div>
        </div>
        <div class="mt-3 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary" type="submit" id="boto_guardar">Guardar canvis</button>
          <a class="btn btn-link" href="../index.html">Tornar</a>
        </div>
      </form>
      <div class="mt-3 text-muted" id="estat_perfil"></div>
      <div class="mt-2 small text-muted" id="estat_sessio"></div>
    </main>

    <footer class="footer text-white mt-5 p-4">
      <div class="container">
        <div class="wrapper-footer">
          <div class="row">
            <div class="col-12 text-start pt-2 pb-0">
              <img src="../img/logo.png" class="footer-logo" alt="Logotip de la plataforma de voluntariat linguistic" />
            </div>
          </div>
          <div class="row">
            <div class="col-12 text-start footer-text">
              <p class="mb-1 fw-bold">Plataforma de Gestio del Voluntariat Linguistic</p>
              <p class="mb-1">&copy; 2026 Tots els drets reservats</p>
              <p class="mb-0">Contacte: info@voluntariatlinguistic.cat</p>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
