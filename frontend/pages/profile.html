<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Parelles Linguistiques</a>
        <div class="d-flex gap-2">
          <span class="navbar-text text-muted" id="usuari_autenticat"></span>
          <button class="btn btn-outline-secondary" id="tancar_sessio" type="button">Tancar sessio</button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h1 class="mb-4">El meu perfil</h1>
      <form class="card p-4" id="formulari_perfil">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" id="nom" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="cognoms">Cognoms</label>
            <input class="form-control" id="cognoms" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="correu">Correu electronic</label>
            <input class="form-control" id="correu" type="email" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="telefon">Telefon</label>
            <input class="form-control" id="telefon" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="parroquia">Parroquia</label>
            <input class="form-control" id="parroquia" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="data_naixement">Data de naixement</label>
            <input class="form-control" id="data_naixement" type="date" />
          </div>
          <div class="col-12">
            <label class="form-label" for="disponibilitat">Disponibilitat</label>
            <input class="form-control" id="disponibilitat" />
          </div>
          <div class="col-12">
            <label class="form-label" for="observacions">Observacions</label>
            <textarea class="form-control" id="observacions" rows="3"></textarea>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Guardar</button>
          <a class="btn btn-link" href="../index.html">Tornar</a>
        </div>
      </form>
      <div class="mt-3 text-muted" id="estat_perfil"></div>
      <div class="mt-2 small text-muted" id="estat_sessio"></div>
    </main>

    <footer class="footer border-top py-3">
      <div class="container text-muted">Projecte academic - MVP</div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
