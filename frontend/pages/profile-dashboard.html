<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Parelles Lingüístiques</a>
        <div class="d-flex gap-2">
          <a class="btn btn-primary" href="../pages/login.html">Accés</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h1 class="mb-4">El meu perfil</h1>
      <section class="row dades-usuari">
            <div>
                <div class="col-md-6">
                    <strong>Nom</strong>
                    <p class="nom" id="nom"></p>
                </div>
                <div class="col-md-6">
                    <strong>Cognoms</strong>
                    <p class="cognoms" id="cognoms"></p>
                </div>
                <div class="col-md-6">
                    <strong>Adreça electrònica</strong>
                    <p class="email" id="email"></p>
                </div>
                <div class="col-md-6">
                    <strong>Telèfon</strong>
                    <p class="telefon" id="telefon"></p>
                </div>
                <div class="col-md-6">
                    <strong>Parròquia</strong>
                    <p class="parroquia" id="parroquia"></p>
                </div>
                <div class="col-md-6">
                    <strong>Data de naixement</strong>
                    <p class="data_naixement" id="data_naixement"></p>
                </div>
                <div class="col-md-6">
                    <strong>Disponibilitat</strong>
                    <p class="disponibilitat" id="disponibilitat"></p>
                </div>
                <div class="col-md-6">
                    <strong>Observacions</strong>
                    <p class="observacions" id="observacions"></p>
                </div>
            </div>
      </section>
    </main>

    <footer class="footer border-top py-3">
      <div class="container text-muted">Projecte acadèmic - MVP</div>
    </footer>

    <script src="../js/profile-dashboard.js"></script>
  </body>
</html>
