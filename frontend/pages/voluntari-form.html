<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulari de voluntari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Parelles Linguistiques</a>
        <div class="d-flex gap-2">
          <a class="btn btn-primary" href="../pages/login.html">Acces</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h1 class="mb-2">Formulari per voluntaris</h1>
      <p class="text-muted">Aquesta inscripcio es oberta a totes les persones que accedeixen al web.</p>

      <form class="card p-4" id="formulari_voluntari">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" id="nom" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="cognoms">Cognoms</label>
            <input class="form-control" id="cognoms" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="correu">Correu electronic</label>
            <input class="form-control" id="correu" type="email" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="telefon">Telefon</label>
            <input class="form-control" id="telefon" />
          </div>
          <div class="col-12">
            <label class="form-label" for="disponibilitat">Disponibilitat</label>
            <input class="form-control" id="disponibilitat" placeholder="Ex: dimarts i dijous a la tarda" />
          </div>
          <div class="col-12">
            <label class="form-label" for="motivacio">Motivacio</label>
            <textarea class="form-control" id="motivacio" rows="3"></textarea>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Enviar formulari</button>
          <a class="btn btn-link" href="../index.html">Tornar</a>
        </div>
      </form>

      <div class="mt-3 text-muted" id="estat_voluntari"></div>
    </main>

    <footer class="footer border-top py-3">
      <div class="container text-muted">Projecte academic - MVP</div>
    </footer>

    <script src="../js/voluntari-form.js"></script>
  </body>
</html>
