<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acces al sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Parelles Linguistiques</a>
        <div class="d-flex gap-2">
          <a class="btn btn-primary" href="../pages/login.html">Acces</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <h1 class="mb-3 text-center">Acces al sistema</h1>
          <p class="text-center text-muted mb-4">Introdueix les teves dades per continuar</p>

          <form class="card card-login p-4 border-0" id="formulari_acces" novalidate>
            <div class="mb-3">
              <label for="correu" class="form-label">Correu electronic</label>
              <input type="email" class="form-control" id="correu" autocomplete="email" required />
              <div class="invalid-feedback">Introdueix un correu valid.</div>
            </div>

            <div class="mb-2">
              <label for="contrasenya" class="form-label">Contrasenya</label>
              <div class="input-group">
                <input type="password" class="form-control" id="contrasenya" minlength="6" autocomplete="current-password" required />
                <button class="btn btn-outline-secondary" type="button" id="mostrar_contrasenya">Mostrar</button>
              </div>
              <div class="invalid-feedback d-block" id="error_contrasenya"></div>
            </div>

            <div class="form-check my-3">
              <input class="form-check-input" type="checkbox" id="recordar_sessio" />
              <label class="form-check-label" for="recordar_sessio">Recorda la sessio en aquest dispositiu</label>
            </div>

            <div class="d-grid gap-2 mt-2">
              <button class="btn btn-primary" id="boto_entrar" type="submit">Entrar</button>
              <a class="btn btn-outline-dark" href="../index.html">Tornar</a>
            </div>
          </form>

          <div class="mt-3 small" id="estat_acces" role="status" aria-live="polite"></div>
        </div>
      </div>
    </main>

    <footer class="footer border-top py-3">
      <div class="container text-muted">Projecte academic - MVP</div>
    </footer>

    <script src="../js/login.js"></script>
  </body>
</html>
