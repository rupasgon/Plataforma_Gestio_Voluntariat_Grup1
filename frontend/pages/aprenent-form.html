<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulari d'aprenent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Parelles Lingüístiques</a>
        <div class="d-flex gap-2">
          <a class="btn btn-primary" href="../pages/login.html">Accés</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h1 class="mb-2">Formulari d'aprenents</h1>
      <p class="text-muted">Aquesta inscripció és oberta a totes les persones que accedeixen al web.</p>
      <br>
      <p>
        <h3>Requisits per ser aprenent o aprenenta:</h3> <br>
        <ul>
          <li>Tenir 18 anys o més.</li>
          <li>Tenir coneixements mínims de català (aproximadament un nivell A1).</li>
        </ul>
      </p>
      <form class="card p-4" id="formulari_aprenent">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-control" id="nom" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="cognoms">Cognoms</label>
            <input class="form-control" id="cognoms" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="correu">Adreça electrònica</label>
            <input class="form-control" id="correu" type="email" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="telefon">Telèfon</label>
            <input class="form-control" id="telefon" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="nivell_catala">Nivell de català</label>
            <select class="form-select" id="nivell_catala" required>
              <option value="">Selecciona una opció</option>
              <option value="inicial">Inicial</option>
              <option value="intermedi">Intermedi</option>
              <option value="avancat">Avancat</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="objectiu_principal">Objectiu principal</label>
            <input class="form-control" id="objectiu_principal" placeholder="Ex: millorar conversa oral" />
          </div>
          <div class="col-12">
            <label class="form-label" for="disponibilitat">Disponibilitat</label>
            <input class="form-control" id="disponibilitat" placeholder="Ex: caps de setmana al mati" />
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Enviar formulari</button>
          <a class="btn btn-link" href="../index.html">Tornar</a>
        </div>
      </form>

      <div class="mt-3 text-muted" id="estat_aprenent"></div>
    </main>

    <footer class="footer border-top py-3">
      <div class="container text-muted">Projecte acadèmic - MVP</div>
    </footer>

    <script src="../js/aprenent-form.js"></script>
  </body>
</html>
